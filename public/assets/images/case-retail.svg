<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="480" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C1A0E"/>
      <stop offset="100%" stop-color="#0F2027"/>
    </linearGradient>
    <linearGradient id="chatbg" x1="0" y1="0" x2="0" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(5,150,105,0.15)"/>
      <stop offset="100%" stop-color="rgba(5,150,105,0)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="220" fill="url(#bg)"/>

  <!-- Subtle dots pattern -->
  <g opacity="0.06">
    <circle cx="40" cy="40" r="2" fill="white"/><circle cx="80" cy="40" r="2" fill="white"/>
    <circle cx="120" cy="40" r="2" fill="white"/><circle cx="160" cy="40" r="2" fill="white"/>
    <circle cx="200" cy="40" r="2" fill="white"/><circle cx="240" cy="40" r="2" fill="white"/>
    <circle cx="40" cy="80" r="2" fill="white"/><circle cx="80" cy="80" r="2" fill="white"/>
    <circle cx="120" cy="80" r="2" fill="white"/><circle cx="160" cy="80" r="2" fill="white"/>
    <circle cx="200" cy="80" r="2" fill="white"/><circle cx="240" cy="80" r="2" fill="white"/>
    <circle cx="40" cy="120" r="2" fill="white"/><circle cx="80" cy="120" r="2" fill="white"/>
    <circle cx="120" cy="120" r="2" fill="white"/><circle cx="160" cy="120" r="2" fill="white"/>
    <circle cx="200" cy="120" r="2" fill="white"/><circle cx="240" cy="120" r="2" fill="white"/>
  </g>

  <!-- Chat interface (left) — AI agent demo -->
  <rect x="20" y="15" width="200" height="190" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Chat header -->
  <rect x="20" y="15" width="200" height="42" rx="16" fill="rgba(5,150,105,0.25)"/>
  <rect x="20" y="37" width="200" height="20" fill="rgba(5,150,105,0.25)"/>
  <circle cx="46" cy="36" r="12" fill="#059669"/>
  <text x="46" y="41" text-anchor="middle" font-size="12" fill="white">S</text>
  <text x="90" y="33" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white">SofIA</text>
  <text x="90" y="47" font-family="system-ui,sans-serif" font-size="9" fill="rgba(52,211,153,0.8)">● En línea</text>

  <!-- Chat messages -->
  <!-- User message -->
  <rect x="80" y="68" width="126" height="30" rx="12" rx_bottom_right="3" fill="rgba(5,150,105,0.3)" stroke="rgba(52,211,153,0.2)" stroke-width="1"/>
  <text x="143" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="rgba(255,255,255,0.85)">¿Tienen laptops</text>
  <text x="143" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="rgba(255,255,255,0.85)">corporativas?</text>

  <!-- SofIA message -->
  <rect x="28" y="108" width="140" height="40" rx="12" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="98" y="121" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(226,232,240,0.75)">¡Hola! Sí, tenemos</text>
  <text x="98" y="133" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(226,232,240,0.75)">3 opciones desde</text>
  <text x="98" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#34D399" font-weight="700">S/ 2,899</text>

  <!-- Product card in chat -->
  <rect x="28" y="158" width="140" height="36" rx="10" fill="rgba(37,99,235,0.2)" stroke="rgba(96,165,250,0.25)" stroke-width="1"/>
  <text x="40" y="171" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="rgba(255,255,255,0.9)">💻 Laptop Empresarial Pro</text>
  <text x="40" y="183" font-family="system-ui,sans-serif" font-size="9" font-weight="900" fill="#60A5FA">S/ 2,899</text>
  <rect x="148" y="162" width="14" height="14" rx="4" fill="rgba(5,150,105,0.7)"/>
  <text x="155" y="173" text-anchor="middle" font-size="9" fill="white">+</text>

  <!-- Metrics panel (right side) -->
  <rect x="240" y="15" width="225" height="190" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="352" y="42" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="1">IMPACTO IA</text>

  <!-- Metric 1 -->
  <rect x="255" y="55" width="95" height="60" rx="10" fill="rgba(5,150,105,0.1)" stroke="rgba(52,211,153,0.2)" stroke-width="1"/>
  <text x="302" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="rgba(148,163,184,0.7)">Consultas / IA</text>
  <text x="302" y="97" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="900" fill="#34D399">60%</text>

  <!-- Metric 2 -->
  <rect x="358" y="55" width="95" height="60" rx="10" fill="rgba(37,99,235,0.1)" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
  <text x="406" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="rgba(148,163,184,0.7)">Velocidad</text>
  <text x="406" y="97" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="900" fill="#60A5FA">3×</text>

  <!-- Progress bars -->
  <text x="255" y="135" font-family="system-ui,sans-serif" font-size="9" fill="rgba(148,163,184,0.6)">Resolución autónoma</text>
  <rect x="255" y="140" width="193" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="255" y="140" width="116" height="8" rx="4" fill="#059669"/>
  <text x="380" y="148" font-family="system-ui,sans-serif" font-size="8" fill="#34D399">60%</text>

  <text x="255" y="162" font-family="system-ui,sans-serif" font-size="9" fill="rgba(148,163,184,0.6)">Satisfacción del cliente</text>
  <rect x="255" y="167" width="193" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="255" y="167" width="174" height="8" rx="4" fill="#2563EB"/>
  <text x="380" y="175" font-family="system-ui,sans-serif" font-size="8" fill="#60A5FA">90%</text>

  <!-- Integrations row -->
  <text x="255" y="195" font-family="system-ui,sans-serif" font-size="9" fill="rgba(148,163,184,0.5)">Integraciones activas:</text>
  <text x="370" y="195" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="rgba(52,211,153,0.8)">ERP · CRM · WhatsApp</text>
</svg>
