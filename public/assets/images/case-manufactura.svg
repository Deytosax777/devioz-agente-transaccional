<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="480" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D0F1E"/>
      <stop offset="100%" stop-color="#1A1040"/>
    </linearGradient>
    <linearGradient id="purp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="220" fill="url(#bg)"/>

  <!-- Dashboard panels -->

  <!-- Panel 1: Donut chart (left) -->
  <rect x="18" y="15" width="130" height="130" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="83" y="36" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="rgba(148,163,184,0.6)" letter-spacing="1">EFICIENCIA</text>

  <!-- Donut chart rings -->
  <circle cx="83" cy="88" r="38" stroke="rgba(255,255,255,0.05)" stroke-width="14" fill="none"/>
  <circle cx="83" cy="88" r="38" stroke="#7C3AED" stroke-width="14" fill="none"
          stroke-dasharray="190 49" stroke-dashoffset="49" stroke-linecap="round"/>
  <circle cx="83" cy="88" r="38" stroke="#2563EB" stroke-width="14" fill="none"
          stroke-dasharray="38 201" stroke-dashoffset="-141" stroke-linecap="round"/>
  <circle cx="83" cy="88" r="38" stroke="#34D399" stroke-width="14" fill="none"
          stroke-dasharray="10 229" stroke-dashoffset="-179" stroke-linecap="round"/>
  <!-- Center text -->
  <text x="83" y="84" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="900" fill="white">79%</text>
  <text x="83" y="97" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(148,163,184,0.6)">OEE</text>

  <!-- Legend -->
  <rect x="28" y="134" width="8" height="8" rx="2" fill="#7C3AED"/>
  <text x="40" y="141" font-family="system-ui,sans-serif" font-size="8" fill="rgba(148,163,184,0.7)">Producción</text>
  <rect x="88" y="134" width="8" height="8" rx="2" fill="#2563EB"/>
  <text x="100" y="141" font-family="system-ui,sans-serif" font-size="8" fill="rgba(148,163,184,0.7)">Mantenimiento</text>

  <!-- Panel 2: Line chart (center) -->
  <rect x="158" y="15" width="160" height="130" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="238" y="36" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="rgba(148,163,184,0.6)" letter-spacing="1">PRODUCCIÓN</text>

  <!-- Grid lines -->
  <line x1="168" y1="60" x2="308" y2="60" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="168" y1="80" x2="308" y2="80" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="168" y1="100" x2="308" y2="100" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="168" y1="120" x2="308" y2="120" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Area fill -->
  <path d="M172 118 L196 98 L220 90 L244 72 L268 65 L292 50 L308 50 L308 128 L172 128 Z"
        fill="rgba(124,58,237,0.12)"/>

  <!-- Line -->
  <polyline points="172,118 196,98 220,90 244,72 268,65 292,50"
            stroke="#A78BFA" stroke-width="2.5" fill="none" stroke-linejoin="round"/>

  <!-- Previous period (dashed) -->
  <polyline points="172,128 196,118 220,112 244,100 268,95 292,82"
            stroke="rgba(148,163,184,0.3)" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>

  <!-- Data points -->
  <circle cx="292" cy="50" r="4" fill="#A78BFA"/>
  <circle cx="292" cy="50" r="8" fill="rgba(167,139,250,0.2)" filter="url(#glow)"/>

  <!-- Month labels -->
  <text x="172" y="140" font-family="system-ui,sans-serif" font-size="7.5" fill="rgba(148,163,184,0.5)" text-anchor="middle">Ene</text>
  <text x="220" y="140" font-family="system-ui,sans-serif" font-size="7.5" fill="rgba(148,163,184,0.5)" text-anchor="middle">Mar</text>
  <text x="268" y="140" font-family="system-ui,sans-serif" font-size="7.5" fill="rgba(148,163,184,0.5)" text-anchor="middle">May</text>

  <!-- Panel 3: KPI cards (right) -->
  <rect x="328" y="15" width="136" height="130" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="396" y="36" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="rgba(148,163,184,0.6)" letter-spacing="1">KPIs</text>

  <!-- KPI 1 -->
  <rect x="338" y="44" width="116" height="24" rx="7" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
  <text x="350" y="59" font-family="system-ui,sans-serif" font-size="8" fill="rgba(148,163,184,0.6)">Fuentes de datos</text>
  <text x="444" y="59" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" font-weight="900" fill="#A78BFA">8</text>

  <!-- KPI 2 -->
  <rect x="338" y="74" width="116" height="24" rx="7" fill="rgba(96,165,250,0.1)" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
  <text x="350" y="89" font-family="system-ui,sans-serif" font-size="8" fill="rgba(148,163,184,0.6)">Dashboards</text>
  <text x="444" y="89" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" font-weight="900" fill="#60A5FA">24</text>

  <!-- KPI 3 -->
  <rect x="338" y="104" width="116" height="24" rx="7" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.2)" stroke-width="1"/>
  <text x="350" y="119" font-family="system-ui,sans-serif" font-size="8" fill="rgba(148,163,184,0.6)">Entrega (semanas)</text>
  <text x="444" y="119" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" font-weight="900" fill="#34D399">6</text>

  <!-- Bottom connected nodes (IoT/data pipeline feel) -->
  <rect x="18" y="158" width="444" height="48" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Source nodes -->
  <circle cx="48" cy="182" r="14" fill="rgba(37,99,235,0.2)" stroke="rgba(96,165,250,0.3)" stroke-width="1.5"/>
  <text x="48" y="186" text-anchor="middle" font-size="12" fill="rgba(96,165,250,0.9)">⚙</text>
  <text x="48" y="198" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="rgba(148,163,184,0.5)">ERP</text>

  <circle cx="108" cy="182" r="14" fill="rgba(124,58,237,0.2)" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
  <text x="108" y="186" text-anchor="middle" font-size="12" fill="rgba(167,139,250,0.9)">📊</text>
  <text x="108" y="198" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="rgba(148,163,184,0.5)">CRM</text>

  <circle cx="168" cy="182" r="14" fill="rgba(5,150,105,0.2)" stroke="rgba(52,211,153,0.3)" stroke-width="1.5"/>
  <text x="168" y="186" text-anchor="middle" font-size="12" fill="rgba(52,211,153,0.9)">🏭</text>
  <text x="168" y="198" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="rgba(148,163,184,0.5)">MES</text>

  <!-- Arrows -->
  <line x1="62" y1="182" x2="94" y2="182" stroke="rgba(148,163,184,0.3)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="122" y1="182" x2="154" y2="182" stroke="rgba(148,163,184,0.3)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="182" y1="182" x2="210" y2="182" stroke="rgba(148,163,184,0.3)" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- ETL box -->
  <rect x="210" y="168" width="60" height="28" rx="8" fill="rgba(37,99,235,0.25)" stroke="rgba(96,165,250,0.35)" stroke-width="1.5"/>
  <text x="240" y="185" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#60A5FA">ETL</text>

  <line x1="270" y1="182" x2="298" y2="182" stroke="rgba(148,163,184,0.3)" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- Power BI box -->
  <rect x="298" y="168" width="78" height="28" rx="8" fill="rgba(234,179,8,0.15)" stroke="rgba(234,179,8,0.3)" stroke-width="1.5"/>
  <text x="337" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#EAB308">Power BI</text>

  <line x1="376" y1="182" x2="404" y2="182" stroke="rgba(148,163,184,0.3)" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- Result -->
  <rect x="404" y="168" width="50" height="28" rx="8" fill="rgba(52,211,153,0.15)" stroke="rgba(52,211,153,0.3)" stroke-width="1.5"/>
  <text x="429" y="181" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#34D399">Real</text>
  <text x="429" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#34D399">Time</text>
</svg>
