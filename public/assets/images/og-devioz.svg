<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080C18"/>
      <stop offset="100%" stop-color="#0D1426"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="480" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="logo-g" x1="0" y1="0" x2="120" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1EC8B0"/>
      <stop offset="50%" stop-color="#0B7065"/>
      <stop offset="100%" stop-color="#032820"/>
    </linearGradient>
    <linearGradient id="logo-dk" x1="0" y1="0" x2="96" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#063530"/>
      <stop offset="100%" stop-color="#020C0A"/>
    </linearGradient>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="60" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="logo-shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#12A090" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="180" cy="180" rx="380" ry="280" fill="rgba(37,99,235,0.09)"/>
  <ellipse cx="1100" cy="500" rx="300" ry="220" fill="rgba(124,58,237,0.08)"/>

  <!-- Logo D — translated and scaled -->
  <g transform="translate(90, 195) scale(2.0)" filter="url(#logo-shadow)">
    <path d="M7 5 L7 75 L37 75 C60 75 73 60 73 40 C73 20 60 5 37 5 Z" fill="url(#logo-g)"/>
    <path d="M20 18 L20 62 L35 62 C50 62 60 52 60 40 C60 28 50 18 35 18 Z" fill="url(#logo-dk)"/>
    <polygon points="9,10 23,10 36,40 23,38 9,38" fill="white"/>
    <polygon points="9,42 23,42 36,40 23,70 9,70" fill="white" opacity="0.88"/>
  </g>

  <!-- DEVIOZ wordmark -->
  <text x="400" y="300" font-family="Arial Black,Arial,sans-serif" font-size="96" font-weight="900" letter-spacing="-4" fill="white">DEVIOZ</text>

  <!-- Tagline -->
  <text x="402" y="358" font-family="Arial,sans-serif" font-size="28" font-weight="400" fill="rgba(226,232,240,0.50)" letter-spacing="0.5">Consultora Tecnológica Peruana · B2B</text>

  <!-- Gradient rule -->
  <rect x="402" y="394" width="500" height="2.5" rx="1.25" fill="url(#accent)"/>

  <!-- Pill tags -->
  <rect x="402" y="424" width="198" height="46" rx="23" fill="rgba(37,99,235,0.14)" stroke="rgba(37,99,235,0.3)" stroke-width="1.5"/>
  <text x="501" y="452" font-family="Arial,sans-serif" font-size="17" font-weight="700" fill="rgba(165,180,252,0.88)" text-anchor="middle">Software Factory</text>

  <rect x="612" y="424" width="148" height="46" rx="23" fill="rgba(37,99,235,0.14)" stroke="rgba(37,99,235,0.3)" stroke-width="1.5"/>
  <text x="686" y="452" font-family="Arial,sans-serif" font-size="17" font-weight="700" fill="rgba(165,180,252,0.88)" text-anchor="middle">Cloud · IA</text>

  <rect x="772" y="424" width="175" height="46" rx="23" fill="rgba(37,99,235,0.14)" stroke="rgba(37,99,235,0.3)" stroke-width="1.5"/>
  <text x="859" y="452" font-family="Arial,sans-serif" font-size="17" font-weight="700" fill="rgba(165,180,252,0.88)" text-anchor="middle">Ciberseguridad</text>

  <!-- URL -->
  <text x="402" y="540" font-family="Arial,sans-serif" font-size="22" fill="rgba(226,232,240,0.28)" font-weight="400">devioz.com</text>

  <!-- SofIA chip top-right -->
  <rect x="956" y="56" width="210" height="68" rx="17" fill="rgba(37,99,235,0.12)" stroke="rgba(37,99,235,0.25)" stroke-width="1.5"/>
  <text x="1061" y="83" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="rgba(165,180,252,0.65)" text-anchor="middle" letter-spacing="2.5">AGENTE IA</text>
  <text x="1061" y="110" font-family="Arial Black,Arial,sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle">SofIA</text>
</svg>
