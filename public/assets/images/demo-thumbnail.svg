<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080C18"/>
      <stop offset="100%" stop-color="#0D1426"/>
    </linearGradient>
    <linearGradient id="grd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="grn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="chat-bg" x1="0" y1="0" x2="0" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(37,99,235,0.06)"/>
      <stop offset="100%" stop-color="rgba(37,99,235,0)"/>
    </linearGradient>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="30" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="20" stdDeviation="40" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
    <clipPath id="phone-clip">
      <rect x="400" y="80" width="480" height="560" rx="40"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="200" cy="300" rx="400" ry="300" fill="rgba(37,99,235,0.08)" filter="url(#glow-blue)"/>
  <ellipse cx="1100" cy="400" rx="350" ry="250" fill="rgba(124,58,237,0.07)" filter="url(#glow-blue)"/>
  <ellipse cx="640" cy="360" rx="200" ry="150" fill="rgba(37,99,235,0.04)"/>

  <!-- Left side: SofIA branding -->
  <g transform="translate(80, 200)">
    <!-- Badge -->
    <rect x="0" y="0" width="140" height="36" rx="18" fill="rgba(37,99,235,0.15)" stroke="rgba(96,165,250,0.3)" stroke-width="1.5"/>
    <circle cx="20" cy="18" r="8" fill="#2563EB"/>
    <text x="20" y="22" text-anchor="middle" font-size="9" fill="white">S</text>
    <text x="75" y="23" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="rgba(165,180,252,0.9)">AGENTE IA</text>

    <!-- Heading -->
    <text x="0" y="90" font-family="system-ui,sans-serif" font-size="62" font-weight="900" fill="white" letter-spacing="-2">SofIA</text>
    <text x="0" y="145" font-family="system-ui,sans-serif" font-size="24" font-weight="400" fill="rgba(226,232,240,0.5)">en acción</text>

    <!-- Feature pills -->
    <rect x="0" y="172" width="172" height="34" rx="17" fill="rgba(5,150,105,0.15)" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
    <text x="20" y="191" font-size="14" fill="#34D399">✓</text>
    <text x="40" y="193" font-family="system-ui,sans-serif" font-size="13" fill="rgba(226,232,240,0.7)">Asesoría 24/7</text>

    <rect x="0" y="216" width="200" height="34" rx="17" fill="rgba(37,99,235,0.12)" stroke="rgba(96,165,250,0.25)" stroke-width="1"/>
    <text x="20" y="235" font-size="14" fill="#60A5FA">✓</text>
    <text x="40" y="237" font-family="system-ui,sans-serif" font-size="13" fill="rgba(226,232,240,0.7)">Pago con Culqi</text>

    <rect x="0" y="260" width="222" height="34" rx="17" fill="rgba(124,58,237,0.12)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
    <text x="20" y="279" font-size="14" fill="#A78BFA">✓</text>
    <text x="40" y="281" font-family="system-ui,sans-serif" font-size="13" fill="rgba(226,232,240,0.7)">Catálogo en Soles</text>

    <!-- DEVIOZ branding -->
    <text x="0" y="370" font-family="system-ui,sans-serif" font-size="13" fill="rgba(226,232,240,0.3)">Desarrollado por</text>
    <text x="0" y="392" font-family="system-ui,sans-serif" font-size="22" font-weight="900" fill="rgba(226,232,240,0.6)" letter-spacing="-0.5">DEVIOZ</text>
  </g>

  <!-- Right side: Devioz wordmark -->
  <text x="1200" y="690" text-anchor="end" font-family="system-ui,sans-serif" font-size="16" fill="rgba(226,232,240,0.2)" letter-spacing="1">devioz.com</text>

  <!-- Center: Chat UI mockup (phone frame) -->
  <rect x="400" y="80" width="480" height="560" rx="40" fill="rgba(13,20,38,0.95)" stroke="rgba(255,255,255,0.12)" stroke-width="2" filter="url(#shadow)"/>
  <!-- Phone notch/status bar -->
  <rect x="400" y="80" width="480" height="60" rx="40" fill="rgba(255,255,255,0.04)"/>
  <rect x="400" y="110" width="480" height="30" fill="rgba(255,255,255,0.04)"/>

  <!-- Chat app header -->
  <rect x="402" y="80" width="476" height="88" rx="40" fill="rgba(37,99,235,0.18)"/>
  <rect x="402" y="128" width="476" height="40" fill="rgba(37,99,235,0.18)"/>

  <!-- SofIA avatar in header -->
  <circle cx="460" cy="148" r="22" fill="url(#grd)"/>
  <text x="460" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="900" fill="white">S</text>
  <!-- Online dot -->
  <circle cx="477" cy="134" r="6" fill="#34D399" stroke="#0D1426" stroke-width="2"/>

  <text x="498" y="142" font-family="system-ui,sans-serif" font-size="17" font-weight="700" fill="white">SofIA · Devioz</text>
  <text x="498" y="160" font-family="system-ui,sans-serif" font-size="12" fill="rgba(52,211,153,0.9)">● En línea · responde al instante</text>

  <!-- Chat messages -->

  <!-- User msg 1 -->
  <rect x="550" y="188" width="300" height="52" rx="18" rx_br="4" fill="rgba(37,99,235,0.35)" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
  <text x="700" y="208" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.9)">Hola, necesito una</text>
  <text x="700" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.9)">web corporativa</text>

  <!-- SofIA msg 1 -->
  <rect x="420" y="256" width="330" height="68" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="585" y="276" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="rgba(226,232,240,0.85)">¡Perfecto! Tenemos plantillas</text>
  <text x="585" y="296" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="rgba(226,232,240,0.85)">corporativas desde</text>
  <text x="585" y="316" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="900" fill="#34D399">S/ 1,499 🚀</text>

  <!-- Product card -->
  <rect x="420" y="338" width="440" height="100" rx="16" fill="rgba(37,99,235,0.12)" stroke="rgba(96,165,250,0.22)" stroke-width="1.5"/>
  <rect x="436" y="354" width="56" height="56" rx="12" fill="url(#grd)"/>
  <text x="464" y="388" text-anchor="middle" font-size="26" fill="white">🌐</text>
  <text x="508" y="370" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="white">Web Corporativa Pro</text>
  <text x="508" y="390" font-family="system-ui,sans-serif" font-size="12" fill="rgba(148,163,184,0.7)">Diseño premium · SEO · Responsive</text>
  <rect x="508" y="404" width="80" height="24" rx="12" fill="url(#grn)"/>
  <text x="548" y="420" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">S/ 1,499</text>
  <rect x="598" y="404" width="100" height="24" rx="12" fill="rgba(37,99,235,0.4)" stroke="rgba(96,165,250,0.4)" stroke-width="1"/>
  <text x="648" y="420" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">Comprar</text>
  <text x="830" y="397" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" fill="rgba(148,163,184,0.4)">via Culqi</text>

  <!-- User msg 2 -->
  <rect x="540" y="452" width="320" height="40" rx="18" fill="rgba(37,99,235,0.35)" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
  <text x="700" y="476" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.9)">¡Perfecto, la quiero!</text>

  <!-- Typing indicator -->
  <rect x="420" y="506" width="90" height="36" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="448" cy="524" r="5" fill="rgba(255,255,255,0.4)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="465" cy="524" r="5" fill="rgba(255,255,255,0.4)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle cx="482" cy="524" r="5" fill="rgba(255,255,255,0.4)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1s" repeatCount="indefinite" begin="0.4s"/>
  </circle>

  <!-- Input bar -->
  <rect x="420" y="560" width="440" height="52" rx="26" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <text x="470" y="591" font-family="system-ui,sans-serif" font-size="14" fill="rgba(148,163,184,0.4)">Escribe tu mensaje…</text>
  <circle cx="836" cy="586" r="18" fill="url(#grd)"/>
  <text x="836" y="592" text-anchor="middle" font-size="16" fill="white">➤</text>

  <!-- Play button overlay (center of screen) -->
  <circle cx="640" cy="360" r="72" fill="rgba(37,99,235,0.25)" filter="url(#glow-blue)"/>
  <circle cx="640" cy="360" r="58" fill="rgba(8,12,24,0.7)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <polygon points="628,338 628,382 672,360" fill="white"/>

  <!-- "Próximamente" label below play button -->
  <rect x="555" y="640" width="170" height="32" rx="16" fill="rgba(37,99,235,0.15)" stroke="rgba(96,165,250,0.25)" stroke-width="1"/>
  <text x="640" y="661" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="rgba(165,180,252,0.8)">Demo en vivo · 2 min</text>
</svg>
